<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Салимзянова Диляра</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
      <header>
      <div class="header-container">
        <a href="#"><img src="./img/xbox.png" alt="" /></a>
        <ul class="nav-list">
          <li>
            <a href="#">Games</a><img src="./img/down-arrow.png" alt="" />
          </li>
          <li>
            <a href="#">Consoles</a><img src="./img/down-arrow.png" alt="" />
          </li>
          <li><a href="#">Community</a></li>
          <input
            type="text"
            class="search-input"
            name="username"
            placeholder="Search"
          />
          <li>
            <a href="#"><img src="./img/user.png" alt="" /> My XBOX</a>
            <img src="./img/down-arrow.png" alt="" />
          </li>
        </ul>
      </div>
    </header>
        <main>
      <!-- Hero секция -->
      <section class="hero">
        <div class="container hero-container">
          <div class="hero-content">
            <h1 class="hero-title">Call of Duty: WWII</h1>
            <h2 class="hero-subtitle">Released on: 23/11/2017</h2>
            <div class="hero-buttons">
              <button class="btn btn-primary">Order Now</button>
              <button class="btn btn-primary">More  Games</button>
            </div>
          </div>
        </div>
      </section>
      <!-- Highlights секция -->

    </main>
<!-- Подвал сайта -->
    <footer class="site-footer">
      <div class="footer-container">
        <div class="footer-top">
          <!-- Левая часть: ссылки -->
          <div class="footer-links">
            <div class="link-column">
              <h4>XBOX</h4>
              <ul>
                <li><a href="#">Support</a></li>
                <li><a href="#">Contact us</a></li>
                <li><a href="#">Privacy & cookies</a></li>
                <li><a href="#">Terms of use</a></li>
              </ul>
            </div>
            <div class="link-column">
              <h4>Developers</h4>
              <ul>
                <li><a href="#">Games</a></li>
                <li><a href="#">Windows 10</a></li>
                <li><a href="#">Creators Program</a></li>
                <li><a href="#">Designed for XBOX</a></li>
              </ul>
            </div>
          </div>

          <!-- Правая часть: Follow Us + иконки соцсетей (как в оригинале) -->
          <div class="footer-social">
            <h4>Follow Us</h4>
            <div class="social-icons">
              <a href="#"
                ><img
                  src="./img/Faacebook.svg"
                  alt="Twitter"
                  width="11"
                  onerror="
                    this.src = '//placehold.co/28x28/444/white?text=T'
                  "
              /></a>
              <a href="#"
                ><img
                  src="./img/Twitter.svg"
                  alt="Facebook"
                  width="21"
                  onerror="
                    this.src = '//placehold.co/28x28/444/white?text=F'
                  "
              /></a>
              <a href="#"
                ><img
                  src="./img/Instagram.svg"
                  alt="Instagram"
                  width="19"
                  onerror="
                    this.src = '//placehold.co/28x28/444/white?text=I'
                  "
              /></a>
            </div>
          </div>
        </div>

        <div class="footer-bottom">
          <div class="footer-legal">
            <div class="language-selector">
              <span>English (United States)</span>
            </div>
          </div>
          <div class="copyright">©Microsoft 2017</div>
        </div>
      </div>
    </footer>
</body>
</html>
